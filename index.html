<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dynamic Task Manager</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Handwriting Font -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Patrick Hand', cursive;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen flex items-center justify-center p-4">

    <!-- Clipboard Container -->
    <div class="max-w-md w-full h-full flex flex-col">

        <!-- Main Card -->
        <div
            class="bg-gray-100 p-6 rounded-lg shadow-xl border border-gray-300 flex flex-col overflow-hidden max-h-[85vh]">

            <!-- Logo -->
            <img src="assets/images/Task-Manager-Logo.png" alt="Task Manager Logo" class="w-40 h-40 mx-auto">
            <!-- Description -->
            <p class="text-center text-gray-800 mt-2">Organize your tasks — add, delete, and clear them with ease.
            </p>
            <!-- COLLAPSIBLE INSTRUCTIONS -->
            <details class="mb-4 mt-2">
                <summary class="cursor-pointer text-center font-semibold text-gray-700 text-lg">
                    How to Use
                </summary>

                <ul class="list-disc text-sm list-inside mt-2 text-center">
                    <li>To Add: Type in your task and click "Add".</li>
                    <li>To Delete:
                        <ol class="list-decimal list-inside">
                            <li>Click "Delete".</li>
                            <li>Click the task.</li>
                            <li>Click "Delete" again.</li>
                        </ol>
                    </li>
                    <li>To Clear: Click "Clear".</li>
                </ul>
            </details>

            <!-- STICKY TASK BAR -->
            <div class="sticky top-0 z-20 bg-gray-100 pb-4 pt-2 border-b border-gray-300">

                <!-- Input -->
                <input id="taskInput" type="text" placeholder="Write a task..." class="w-full p-3 border border-gray-300 rounded-lg bg-white/80
                    focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4" />

                <!-- Buttons -->
                <div class="flex flex-col gap-3 sm:flex-row sm:gap-2">
                    <!-- Add Button -->
                    <button id="addBtn" class="flex-1 bg-green-500 text-gray-800 font-semibold tracking-widest p-3 rounded-full shadow 
                        hover:bg-green-600 active:scale-95 transition">
                        ➕ Add
                    </button>
                    <!-- Delete Button -->
                    <button id="deleteBtn" class="flex-1 bg-blue-500 font-semibold text-gray-800 tracking-widest p-3 rounded-full shadow 
                        hover:bg-blue-600 active:scale-95 transition">
                        🗑️ Delete
                    </button>
                    <!-- Clear Button -->
                    <button id="clearBtn" class="flex-1 bg-indigo-500 font-semibold text-gray-800 tracking-widest p-3 rounded-full shadow 
                        hover:bg-indigo-600 active:scale-95 transition">
                        ✨ Clear
                    </button>
                </div>
            </div>

            <!-- TASK LIST (ONLY PART THAT SCROLLS) -->
            <ul id="taskList" class="space-y-3 mt-4 overflow-y-auto flex-1 pr-2"></ul>

            <!-- Message Area -->
            <p id="message"
                class="text-center text-gray-700 mt-4 font-semibold transition-opacity duration-500 opacity-0"></p>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
